version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: certfr
      POSTGRES_USER: certfr
      POSTGRES_PASSWORD: certfr_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U certfr']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://certfr:certfr_secret@db:5432/certfr
      PORT: 3001
      FETCH_INTERVAL_MINUTES: 15
      # Email config (fill in later)
      EMAIL_PROVIDER: mock
      EMAIL_TO: admin@example.com
      EMAIL_FROM: certfr-alerts@example.com
      # SMTP_HOST: smtp.gmail.com
      # SMTP_PORT: 587
      # SMTP_USER: you@gmail.com
      # SMTP_PASS: yourpassword
      # RESEND_API_KEY: re_xxxxx
    ports:
      - '3001:3001'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      # Internal URL for SSR calls
      API_URL: http://backend:3001
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
